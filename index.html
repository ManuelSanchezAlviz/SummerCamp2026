<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Camp 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef3f8;
}

.hero{
height:100vh;
background:linear-gradient(135deg,#004b8d,#0099cc);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:30px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:40px;
}

.button{
display:inline-block;
background:white;
color:#004b8d;
padding:18px 40px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.button:hover{
transform:scale(1.05);
}

.menu{
padding:70px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:20px;
padding:35px;
text-align:center;
text-decoration:none;
color:#333;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.icon{
font-size:50px;
margin-bottom:20px;
}

footer{
padding:40px;
text-align:center;
color:#666;
}

</style>

</head>

<body>

<section class="hero">

<div>

<h1>🏕 Summer Camp 2026</h1>

<p>Welcome to your interactive student guide.</p>

<a class="button" href="#guide">Enter Guide</a>

</div>

</section>

<section class="menu" id="guide">

<a class="card" href="#">
<div class="icon">📖</div>
<h2>Rules & Expectations</h2>
</a>

<a class="card" href="#">
<div class="icon">📅</div>
<h2>Daily Schedule</h2>
</a>

<a class="card" href="#">
<div class="icon">🍽️</div>
<h2>Dining Hall</h2>
</a>

<a class="card" href="#">
<div class="icon">🏊</div>
<h2>Activities</h2>
</a>

<a class="card" href="#">
<div class="icon">🚌</div>
<h2>Excursions</h2>
</a>

<a class="card" href="#">
<div class="icon">🛏️</div>
<h2>Accommodation</h2>
</a>

<a class="card" href="#">
<div class="icon">🩺</div>
<h2>Health Centre</h2>
</a>

<a class="card" href="#">
<div class="icon">🚨</div>
<h2>Emergency</h2>
</a>

</section>

<footer>

Collège du Léman • Summer Camp 2026

</footer>

</body>

</html>
